db_file     "~/.config/mpd/database"
music_directory "/home/shrek/Music"
auto_update "yes"
playlist_directory "~/Music/playlists"
restore_paused "yes"
bind_to_address "127.0.0.1"
port "6600"
decoder {
	plugin "flac"
	plugin "mp3"
}
audio_output {
	type 	"alsa"
	name	"Output"
	format 	"44100:16:2"
	mixer_type "hardware"
	mixer_device "default"
	mixer_control "PCM"
}
audio_output {
	type 	"fifo"
	name 	"Visualizer"
	path 	"/tmp/mpd.fifo"
	format 	"44100:16:2"
}
